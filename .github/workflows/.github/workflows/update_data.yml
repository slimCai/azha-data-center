name: Update Gold Price Daily

on:
  schedule:
    # 使用 Cron 表达式，这里设置为每天 UTC 时间 00:00 执行（北京时间早上 8:00）
    - cron: '0 0 * * *'
  # 允许手动在网页上点击运行，方便我们测试
  workflow_dispatch: 

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Python script
        run: python fetch_gold_price.py

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add gold_price_trend.json
          # 如果文件没有变化，commit 会报错，所以加了 || true 忽略错误
          git commit -m "Auto-update gold price data" || true
          git push
